<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marte MOLA 3D</title>
    <link rel="stylesheet" href="./src/styles.css?v=26" />
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <canvas id="scene" aria-label="Modelo 3D de Marte con elevacion MOLA"></canvas>

      <section class="panel controls" aria-label="Controles de Marte 3D">
        <div class="brand">
          <div>
            <p class="eyebrow">NASA MOLA / MEGDR</p>
            <h1>Marte 3D</h1>
          </div>
          <span id="load-state">cargando</span>
        </div>

        <details class="control-section" open>
          <summary>Agua</summary>
          <div class="control-group">
            <div class="control-title">
              <label for="sea-level">Nivel del mar</label>
              <output id="sea-output" for="sea-level">0 m</output>
            </div>
            <input id="sea-level" type="range" min="-9000" max="22000" value="0" step="100" />
            <div class="row">
              <input id="sea-number" type="number" min="-9000" max="22000" value="0" step="100" />
              <button id="datum-button" type="button" data-sea-preset="0">Datum 0 m</button>
            </div>
            <div class="preset-grid" aria-label="Presets de nivel del mar">
              <button type="button" data-sea-preset="-9000">Seco</button>
              <button type="button" data-sea-preset="1000">+1 km</button>
              <button type="button" data-sea-preset="3000">+3 km</button>
              <button type="button" data-sea-preset="6000">+6 km</button>
              <button type="button" data-sea-preset="10000">+10 km</button>
              <button type="button" id="balance-water">50%</button>
            </div>
          </div>
          <div class="switches compact">
            <label><input id="water-toggle" type="checkbox" checked /> Superficie de agua</label>
            <label><input id="connected-toggle" type="checkbox" checked /> Costa realista</label>
            <label><input id="shore-toggle" type="checkbox" checked /> Bordes suaves</label>
            <label><input id="rivers-toggle" type="checkbox" checked /> Rios por deshielo</label>
            <label><input id="tributaries-toggle" type="checkbox" checked /> Afluentes</label>
          </div>
        </details>

        <details class="control-section" open>
          <summary>Terreno</summary>
          <div class="control-group">
            <div class="control-title">
              <span>Modo visual</span>
              <output id="visual-output">Earth-like</output>
            </div>
            <div class="segmented" role="group" aria-label="Modo visual">
              <button type="button" data-visual-mode="earth" class="active">Earth-like</button>
              <button type="button" data-visual-mode="mars">Mars raw</button>
              <button type="button" data-visual-mode="atlas">Atlas</button>
            </div>
          </div>
          <div class="control-group">
            <div class="control-title">
              <label for="height-scale">Relieve</label>
              <output id="scale-output" for="height-scale">18x</output>
            </div>
            <input id="height-scale" type="range" min="1" max="40" value="18" step="1" />
            <div class="row">
              <button id="real-scale" type="button">1x real</button>
              <button id="visible-scale" type="button">18x visible</button>
            </div>
          </div>
          <div class="switches compact">
            <label><input id="snow-toggle" type="checkbox" checked /> Nieve por altura</label>
            <label><input id="polar-toggle" type="checkbox" checked /> Hielo polar</label>
            <label><input id="biome-toggle" type="checkbox" checked /> Biomas</label>
            <label><input id="ultra-toggle" type="checkbox" /> Ultra creativo</label>
            <label><input id="wire-toggle" type="checkbox" /> Malla</label>
          </div>
          <div class="control-group">
            <div class="control-title">
              <label for="ice-extent">Extension de hielo</label>
              <output id="ice-output" for="ice-extent">35%</output>
            </div>
            <input id="ice-extent" type="range" min="0" max="100" value="35" step="1" />
          </div>
          <div class="control-group ultra-controls">
            <div class="control-title">
              <span>Intensidad Ultra</span>
              <output id="ultra-output">Cinematico</output>
            </div>
            <div class="segmented" role="group" aria-label="Intensidad Ultra">
              <button type="button" data-ultra-intensity="subtle">Sutil</button>
              <button type="button" data-ultra-intensity="cinematic" class="active">Cinematico</button>
              <button type="button" data-ultra-intensity="extreme">Extremo</button>
            </div>
          </div>
        </details>

        <details class="control-section" open>
          <summary>Vista</summary>
          <div class="control-group">
            <div class="control-title">
              <span>Detalle</span>
              <output id="resolution-output">480 x 240</output>
            </div>
            <div class="segmented" role="group" aria-label="Resolucion de la malla">
              <button type="button" data-resolution="low">Baja</button>
              <button type="button" data-resolution="medium" class="active">Media</button>
              <button type="button" data-resolution="high">Alta</button>
              <button type="button" data-resolution="ultra">Ultra 1:1</button>
            </div>
          </div>
          <div class="preset-grid camera-grid" aria-label="Destinos de camara">
            <button type="button" data-camera-target="olympus">Olympus</button>
            <button type="button" data-camera-target="valles">Valles</button>
            <button type="button" data-camera-target="hellas">Hellas</button>
            <button type="button" data-camera-target="tharsis">Tharsis</button>
            <button type="button" data-camera-target="poles">Polos</button>
          </div>
          <div class="preset-grid camera-grid" aria-label="Tours">
            <button type="button" data-tour="seas">Mares</button>
            <button type="button" data-tour="volcanoes">Volcanes</button>
            <button type="button" data-tour="canyons">Canones</button>
            <button type="button" data-tour="continents">Continentes</button>
            <button type="button" id="beauty-shot">Captura bonita</button>
            <button type="button" id="timelapse-button">Time-lapse mar</button>
            <button type="button" id="share-button">Compartir vista</button>
          </div>
          <div class="switches compact">
            <label><input id="autorotate-toggle" type="checkbox" checked /> Auto-rotar</label>
            <label><input id="orientation-toggle" type="checkbox" checked /> Orientacion</label>
            <label><input id="labels-toggle" type="checkbox" checked /> Lugares</label>
            <label><input id="atmosphere-toggle" type="checkbox" checked /> Atmosfera</label>
            <label><input id="clouds-toggle" type="checkbox" checked /> Nubes</label>
          </div>
          <button id="reset-camera" type="button" class="wide-button">Reset camara</button>
        </details>
      </section>

      <section class="panel readout" aria-label="Lecturas del modelo">
        <div>
          <span>Inundado</span>
          <strong id="flooded-output">0.0%</strong>
        </div>
        <div>
          <span>Agua</span>
          <strong id="water-output">calculando</strong>
        </div>
        <div>
          <span>Punto</span>
          <strong id="cursor-output">pasa el cursor por Marte</strong>
        </div>
        <div>
          <span>Rios</span>
          <strong id="river-output">calculando</strong>
        </div>
      </section>

      <div class="legend" aria-hidden="true">
        <span>-8 km</span>
        <i></i>
        <span>+21 km</span>
      </div>

      <section class="panel minimap-panel" aria-label="Mapa 2D de Marte">
        <div class="map-title">
          <span>Mapa 2D</span>
          <strong id="scale-output-2">Radio 3396 km</strong>
        </div>
        <canvas id="minimap" width="360" height="180" aria-label="Mapa equirectangular clicable"></canvas>
      </section>
    </main>

    <script type="module" src="./src/app.js?v=26"></script>
  </body>
</html>
